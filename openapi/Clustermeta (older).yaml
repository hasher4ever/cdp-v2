openapi: "3.0.3"
info:
  title: "CDP Cluster management project"
  version: "0.0.1"
  description: "Cluster management API doc"
servers: []
tags:
  - name: auth
  - name: tenant
  - name: schema
  - name: admin
  - name: udafs
  - name: segmentation
  - name: field
  - name: commchan
  - name: campaign
paths:
  /api/tenants/schema/draft-schema/status:
    get:
      tags:
        - "tenant"
        - "schema"
      summary: "Get Number of changes need to be applyed"
      description: "This api returns number of commands should be run to the backend"
      operationId: "getPlanDraftStatus"
      responses:
        '409': {'$ref': '#/components/responses/StandardError'}
        '200':
          description: "Successfully draft was applied"
          content:
            application/json:
              schema:
                type: object
                required: [numberOfChanges]
                properties:
                  numberOfChanges: {type: integer,  nullable: false}
  /api/tenants/schema/draft-schema/cancel:
    delete:
      tags:
        - "schema"
      summary: "Cancel Drafted changes"
      description: "cancel and delete all drafted changes"
      operationId: "cancelDraftSchema"
      responses:
        '409': {'$ref': '#/components/responses/StandardError'}
        '200':
          description: "drafted data successfully deleted"

  /api/tenants/schema/draft-schema/apply:
    post:
      tags:
        - "schema"
      summary: "Apply Drafted changes"
      description: "Will be used to aplly draft changes to schema"
      operationId: "applyDraftPlan"
      responses:
        '409': {'$ref': '#/components/responses/StandardError'}
        '200':
          description: "Successfully draft was applied"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'

  /api/tenants/schema/events/validate-api-name/{eventTypeId}:
    post:
      tags:
        - "schema"
      summary: "Validate api name of customer field"
      operationId:  validateEventApiNameField
      description:  "Validates ApiName of Customer Fields for create or update"
      parameters:
        - in: query
          name: update_id
          required: false
          schema:
            type: string
            format: uuid
            description:  "currently updating customer id, in order to exclude old value from validition"
        - in: query
          name: api_name
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9]+([\\_a-z0-9]+)*$"
            minLength: 3
            maxLength: 255
            nullable: false
            description:  "api name should be in lower cases and should start with only latter, checkout pattern"
        - in: path
          name: eventTypeId
          schema: {type: integer}
          required: true
          description: 'event type id (not uid)'
      responses:
        '200':
          description: "Customer field validation completed"
          content:
            application/json:
              schema:
                type: object
                required: [valid, message]
                properties:
                  valid: {type: boolean}
                  message: {type: string}
        '409': { '$ref': '#/components/responses/StandardError' }

  /api/tenants/schema/customers/validate-api-name:
    post:
      tags:
        - "schema"
      summary: "Validate api name of customer field"
      operationId:  validateCustomerApiNameField
      description:  "Validates ApiName of Customer Fields for create or update"
      parameters:
        - in: query
          name: update_id
          required: false
          schema:
            type: string
            format: uuid
            description:  "currently updating customer id, in order to exclude old value from validition"
        - in: query
          name: api_name
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9]+([\\_a-z0-9]+)*$"
            minLength: 3
            maxLength: 255
            nullable: false
            description:  "api name should be in lower cases and should start with only latter, checkout pattern"
      responses:
        '200':
          description: "Customer field validation completed"
          content:
            application/json:
              schema:
                type: object
                required: [valid, message]
                properties:
                  valid: {type: boolean}
                  message: {type: string}
        '409': { '$ref': '#/components/responses/StandardError' }
  /api/tenants/schema/customers/fields:
    get:
      tags:
        - "schema"
      summary: "List customers fields"
      operationId: listCustomersFields
      description:  "List Customers specific fields"
      parameters:
        - in: query
          name: exclude_draft
          required: false
          schema:
            type: boolean
            default: false

      responses:
        '409': { '$ref': '#/components/responses/StandardError' }
        '200':
          description: "list of customers fields"
          content:
            application/json:
              schema:
                type: object
                required: [list]
                properties:
                  list:
                    type: array
                    items:  {'$ref': '#/components/schemas/MappedFieldRes'}
    post:
      tags:
        - "schema"
      summary: "Create Customer Field"
      operationId: createCustomerField
      description:  "Creates field for customer as draft"
      requestBody:
        description: "Field Create body for selectd customer"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/MappedFieldCreateReq'}
      responses:
        '200':
          description: "Successfully added to draft field"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'
        '409': { '$ref': '#/components/responses/StandardError' }
    put:
      tags:
        - "schema"
      summary: "Update Customers Field"
      operationId: updateCustomerField
      description:  "Updates all fields of draft field or some (apiName, displayName) of non draf fields"
      parameters:
        - in: query
          name: field_id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type field id'
      requestBody:
        description: "Field Create body for selectd event type"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/MappedFieldCreateReq'}
      responses:
        '200':
          description: "Successfully added to draft field"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'
        '409': { '$ref': '#/components/responses/StandardError' }
    delete:
      tags:
        - "schema"
      summary: "Delete Customers fields"
      operationId: "deleteCustomerField"
      description:  "Delete Customer specific fields"
      parameters:
        - in: query
          name: field_id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type field id'
      responses:
        '204': { description: "Successfully deleted" }
        '409': { '$ref': '#/components/responses/StandardError' }
  /api/tenants/schema/events/fields/{eventTypeId}:
    get:
      tags:
        - "schema"
      summary: "List Event Type fields"
      operationId: listEventTypeFields
      description:  "List Event Types specific fields"
      parameters:
        - in: path
          name: eventTypeId
          schema: {type: integer}
          required: true
          description: 'event type id (not uid)'
        - in: query
          name: exclude_draft
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '409': { '$ref': '#/components/responses/StandardError' }
        '200':
          description: "list of event types"
          content:
            application/json:
              schema:
                type: object
                required: [list]
                properties:
                  list:
                    type: array
                    items:  {'$ref': '#/components/schemas/MappedFieldRes'}
    post:
      tags:
        - "schema"
      summary: "Create Event Type Field"
      operationId: createEventTypeField
      description:  "Creates field for event type as draft"
      parameters:
        - in: path
          name: eventTypeId
          schema: {type: integer}
          required: true
          description: 'event type id (not uid)'
      requestBody:
        description: "Field Create body for selectd event type"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/MappedFieldCreateReq'}
      responses:
        '200':
          description: "Successfully added to draft field"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'
        '409': { '$ref': '#/components/responses/StandardError' }
    put:
      tags:
        - "schema"
      summary: "Update Event Type Field"
      operationId: updateEventTypeField
      description:  "Updates all fields of draft field or some (apiName, displayName) of non draf fields"
      parameters:
        - in: path
          name: eventTypeId
          schema: {type: integer}
          required: true
          description: 'event type id (not uid)'
        - in: query
          name: field_id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type field id'
      requestBody:
        description: "Field Create body for selectd event type"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/MappedFieldCreateReq'}
      responses:
        '200':
          description: "Successfully added to draft field"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'
        '409': { '$ref': '#/components/responses/StandardError' }
    delete:
      tags:
        - "schema"
      summary: "Delete Event Type fields"
      operationId: "deleteEventTypeField"
      description:  "Delete Event Types specific fields"
      parameters:
        - in: path
          name: eventTypeId
          schema: {type: integer}
          required: true
          description: 'event type id (not uid)'
        - in: query
          name: field_id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type field id'
      responses:
        '204': { description: "Successfully deleted" }
        '409': { '$ref': '#/components/responses/StandardError' }

  /api/tenants/schema/event-types-name-exists:
    post:
      tags:
        - "schema"
      summary: "Check name that exists"
      operationId: eventTypeNameExists
      description:  "checks name that exists, in case of update please send current uid"
      parameters:
        - in: query
          name: update_id
          schema: {type: string, format: uuid}
          description: 'event type uid'
        - in: query
          name: name
          schema: {type: string}
          required: true
          description: 'name of event type id'
      responses:
        '200':
          description: "Successfully new event type added as draft"
          content:
            application/json:
              schema:
                type: object
                required: [exists]
                properties:
                  exists: {type: boolean}
        '409': { '$ref': '#/components/responses/StandardError' }

  /api/tenants/schema/event-types/get-by-id:
    get:
      tags:
        - "schema"
      summary: "Get one event type by id"
      operationId: getEventTypeById
      description:  "List Event Types"
      parameters:
        - in: query
          name:  id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type uuid'
      responses:
        '200':
          description: success response
          content:
            application/json:
              schema:  {'$ref': '#/components/schemas/EventTypeRes'}
        '409': { '$ref': '#/components/responses/StandardError' }
  /api/tenants/schema/event-types:
    get:
      tags:
        - "schema"
      summary: "List Event Type"
      operationId: listEventTypes
      description:  "List Event Types"
      parameters:
        - in: query
          name: exclude_draft
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '409': { '$ref': '#/components/responses/StandardError' }
        '200':
          description: "list of event types"
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/EventTypeListRes'}
    put:
      tags:
        - "schema"
      summary: "Update Event Type"
      operationId: updateEventType
      description:  "Update Event Type as draft"
      parameters:
        - in: query
          name:  id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type uuid for update'
      requestBody:
        description: "Event update request body"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/EventTypeCreateReq'}
      responses:
        '204': { description: "Successfully new event type added as draft for update" }
        '409': { '$ref': '#/components/responses/StandardError' }

    delete:
      tags:
        - "schema"
      summary: delete event type drafted data
      description: can be used to delete or rollback drafted event type values, deleting acutual event type not allowed
      operationId: deleteDraftEventType
      parameters:
        - in: query
          name:  id
          schema: {type: string, format: uuid}
          required: true
          description: 'event type uuid for delete'
      responses:
        '200': { description: "Successfully  deleted from drafts" }
        '409': { '$ref': '#/components/responses/StandardError' }

    post:
      tags:
        - "schema"
      summary: "Create Event Type"
      operationId: createEventType
      description:  "Create Event Type"
      requestBody:
        description: "Event create request body"
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/EventTypeCreateReq'}
      responses:
        '200':
          description: "Successfully new event type added as draft"
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/IdItemUUID'
        '409': { '$ref': '#/components/responses/StandardError' }


  /api/tenants/schema/internal/{table}/fields/info:
    get:
      tags:
        - "tenant"
        - "schema"
      summary: "Get fields information"
      description: "table : [customers|events]"
      operationId: getFieldsInfo
      parameters:
        - in: path
          name: table
          schema: {type: string, enum: [customers, events]}
          required: true
          description: 'table resource'
      responses:
        '409': {'$ref': '#/components/responses/StandardError'}
        '200':
          description: "Successfully responsed with fields data"
          content:
            application/json:
              schema:
                required: [fields]
                type: object
                properties:
                  fields: {type: array, items: {'$ref': '#/components/schemas/Field'}}
  /api/tenants/info:
    get:
      tags:
        - "tenant"
        - "schema"
      summary: "Get Tenant Info"
      description: "responses with tenant info"
      operationId: "getTenantInfo"
      responses:
        '404':
          description: "tenant not found"
        '200':
          description: Success response tenant info
          content:
            application/json:
              schema:
               '$ref': '#/components/schemas/TenantInfo'

  /api/tenants/campaign/compute/send:
    post:
      tags:
        - campaign
      description: Start sending campaigns to customers by id, id is required
      summary: send campaign
      operationId: sendCampaign
      parameters:
        - name: id
          in: query
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      responses:
        '204': {description: "Campaign Send Successfully started"}
        '409': {'$ref': '#/components/responses/StandardError'}
  /api/tenants/campaign/compute/preview:
    post:
      tags:
        - campaign
      description: preview custom count of campaign, please send campaignID or Body but not both at the same time
      summary: Preview Campaign Customer by id or body
      operationId: previewCampaign
      parameters:
        - name: id
          in: query
          required: false
          schema:
            '$ref': '#/components/schemas/UUID'
      requestBody:
        description: "Campaign data for campaign create"
        content:
          application/json:
            schema:
              type: object
              properties:
                data: {'$ref': '#/components/schemas/CampaignReq'}
      responses:
        '200':
          description: "successfully coputed campaign"
          content:
            application/json:
              schema: {'$ref':'#/components/schemas/CampaignPeviewRes'}
        '409': {'$ref': '#/components/responses/StandardError'}

  /api/tenants/campaign/{id}:
    put:
      tags:
        - campaign
      description: Update existing campaign By ID
      summary: Update capaign
      operationId: updateCampaignById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CampaignReq'
      responses:
        '200':
          description: Campaign successfully updated
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CampaignRes'}
        '409': {'$ref': '#/components/responses/StandardError'}
    get:
      tags:
        - campaign
      description: Get Campaign by id
      summary: Get Campaign by id
      operationId: getCampaignID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      responses:
        '200':
          description: Get Campaign Name
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CampaignRes'}
        '404': {description: campaign not found}
  /api/tenants/campaign:
    post:
      tags:
        - campaign
      description: Create Campaign
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CampaignReq'
      responses:
        '200':
          description: Campaign successfully created
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CampaignRes'}
        '409': {'$ref': '#/components/responses/StandardError'}
    get:
      tags:
        - campaign
      description: Get Campaign names
      operationId: listCampaignNames
      parameters:
        - name: page
          in: query
          required: false
          schema: {type: integer, default: 0}
        - name: size
          in: query
          required: false
          schema: {type: integer, default: 0}
      responses:
        '200':
          description: Paged response of camapign name items
          content:
            application/json:
              schema: { '$ref': "#/components/schemas/NameItemUUIDArr" }
        '409': {'$ref': '#/components/responses/StandardError'}

  /api/tenants/commchan/validate:
    post:
      tags:
        - commchan
      operationId: validateCommChan
      summary: verify communication channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CommChanReq'
      responses:
        '200':
          description: 'verification result of communication channel'
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CommChanValidationResult'}

  /api/tenants/commchan/{id}/verify:
    post:
      tags:
        - commchan
      operationId: verifyCommChan
      summary: verify communication channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      responses:
        '200':
          description: 'verification result of communication channel'
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CommChanVerificaitonRes'}
        '409': {'$ref': '#/components/responses/StandardError'}
  /api/tenants/commchan/{id}:
    get:
      tags:
        - commchan
      operationId: getCommChan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      responses:
        '200':
          description: 'Communication channel names'
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CommChanRes'}
        '404': {description: 'commchan not found'}
  /api/tenants/commchan:
    get:
      tags:
        - commchan
      description: 'Get List of Communication Name items'
      operationId: listCommChans
      parameters:
        - name: verified
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: 'Communication channel names'
          content:
            application/json:
              schema:
                  type: array
                  items: {'$ref': '#/components/schemas/CommChanNameItem'}
    post:
      tags:
        - commchan
      summary: Create Communication Channel
      description: ''
      operationId: createCommChan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/CommChanReq'
      responses:
        '200':
          description: "Communication channel successfully created"
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/CommChanRes'}
        '409': {'$ref': '#/components/responses/StandardError'}
  /api/tenant/specific-fields:
    put:
      tags:
      - tenant
      summary: Create Specific Field Mappings
      description: ''
      operationId: createOrUpdateSpecificFields
      requestBody:
        required: true
        content:
          application/json:
            schema: {'$ref': '#/components/schemas/SpecificFieldsReq'}
      responses:
        '201':
          description: "Specific Field is created Successfully"
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: {type: string, format: uuid}

    get:
      tags:
        - tenant
      summary: Get Specific Field Name Mappings
      description: 'Return Specific Field Name Mappings for a tenant'
      operationId: getSpecificFields
      responses:
        '200':
          description: "Special Field List"
          content:
            application/json:
              schema: { '$ref': '#/components/schemas/GetSpecificFieldsResp'}

  /api/tenant/template:
    post:
      tags:
        - campaign
      summary: Create Tenant Template
      description: ''
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/TemplateReq'
      responses:
        '201':
          description: "Template successfully created"
          content:
            application/json:
              schema: { '$ref': '#/components/schemas/TemplateRes' }
        '409': {'$ref': '#/components/responses/StandardError'}
    get:
      tags:
        - campaign
      summary: Get Tenant Template List
      description: 'Returns list of template with pagination'
      operationId: pageTemplates
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            format: int
            default: 10
      responses:
        '200':
          description: 'Template list with pagination'
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/PageTemplateRes'}

  /api/tenant/template/{id}:
    get:
      tags:
        - campaign
      summary: Get Tenant Template
      description: 'Returns Template by id'
      operationId: getTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      responses:
        '200':
          description: 'Template details'
          content:
            application/json:
              schema: {'$ref': '#/components/schemas/TemplateDetailsRes'}
        '409': {'$ref': '#/components/responses/StandardError'}
        '404':
          description: 'Template not found'

    put:
      tags:
        - campaign
      summary: Update Template
      description: 'Updates Template'
      operationId: putTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            '$ref': '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/TemplateReq'
      responses:
        '200':
          description: 'Updated Template details'
          content:
            application/json:
              schema: { '$ref': '#/components/schemas/TemplateDetailsRes' }
        '409': { '$ref': '#/components/responses/StandardError' }
        '404':
          description: 'Template not found'


  /api/tenants/segmentation/preview:
    post:
      tags:
        - segmentation
      summary: Preview Segmentation
      description: Preview segmentation
      operationId: getPreviewSegmentation
      parameters:
        - name: segmentationId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        description: Segmentation preview description
        content:
          application/json:
            schema:
              type: object
              properties:
                segmentation:
                  $ref: "#/components/schemas/SegmentationCreateReq"
      responses:
        '200':
          description: Segmentation Preview Response
          content:
            application/json:
              schema: { '$ref': "#/components/schemas/SegmentationPreviewRes" }
        '404': {description: 'segmentation not found'}
        '409': {'$ref': '#/components/responses/StandardError'}

  /api/tenants/segmentation:
    get:
      tags:
        - segmentation
      summary: Get list of Segmentation
      description: Get list of Segmentation, Name and Ids
      operationId: pageSegmentations
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Segment Name List
          content:
            application/json:
              schema: { '$ref': "#/components/schemas/PageNameItemUUID" }
        '409': {'$ref': '#/components/responses/StandardError'}
    post:
      tags:
        - segmentation
      summary: Create Segmentation
      operationId: create_segmentation
      requestBody:
        required: true
        description: Segmentation definitition to create
        content:
          application/json:
            schema:
