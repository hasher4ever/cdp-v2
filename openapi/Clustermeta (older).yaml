components:
  responses:
    StandardError:
      description: 'StandardError reponse for validation and bissunies logic conflict'
      content:
        application/json:
          schema:
            '$ref': '#/components/schemas/ErrorCodeResponse'
  schemas:
    ErrorCodeResponse:
      type: object
      required: [code, description, data]
      properties:
        code: {type: integer}
        description: {type: string}
        data: {type: object, additionalProperties: true}
    IdItemUUID:
      type: object
      required: [ID]
      additionalProperties: false
      properties:
        ID: {type: string, format: uuid, nullable: false}
    UDAFDefinitionArr:
      type: object
      required: ["items"]
      additionalProperties: false
      properties:
        items:
          type: array
          nullable: false
          items: {'$ref': '#/components/schemas/UDAFDefinition'}
    UDAFDefinition:
      type: object
      required: [id,name,types]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 255}
        types: {$ref: '#/components/schemas/UDAFPramDef'}
    UDAFPramDef:
      type: object
      required: [valueType, paramType]
      properties:
        valueType: {type: string}
        paramType: {type: array, items: {type: string}}

    PageNameItemUUID:
      type: object
      required: [ "items", "totalCount"]
      additionalProperties: false
      properties:
        items:
          type: array
          nullable: false
          items: { '$ref': '#/components/schemas/NameItemUUID' }
        totalCount: {type: integer, nullable: false}
    NameItemUUIDArr:
      type: object
      required: ["items"]
      additionalProperties: false
      properties:
        items:
          type: array
          nullable: false
          items: { '$ref': '#/components/schemas/NameItemUUID' }

    NameItemUUID:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id: {type: string, format: uuid}
        name: {type: string }
    UUID:
      type: string
      x-go-type: uuid.UUID
      x-go-type-import:
        path: github.com/google/uuid
        name: uuid
    Artifact:
      type: object
      additionalProperties: false
      x-go-type-import:
        path: cdp.uz/cmd/clustermeta/internal/infra/db
        name: entity
      x-go-type: db.NamedArtifact
      properties:
        name: {type: string, maxLength: 120, example: "my-tenant", nullable: false}
        isPresent: {type: boolean, nullable: false}
      required: [name, isPresent]
    FieldDataType:
      type: string
      enum: [BOOL, BIGINT, DOUBLE, VARCHAR, DATE, DATETIME, JSON]
      description: "The data type of the new field. Choose one of BOOL, BIGINT, DOUBLE, VARCHAR, DATE, or DATETIME."
    FieldAccessType:
      type: string
      enum: [field_hidden, field_optional, field_required]
      description: "REQUIRED makes field required on API ingest, HIDDEN makes api to reject the field if it was sent"
    MappedFieldCreateReq:
      type: object
      required: [apiName, displayName, flagMulti, access, dataType]
      properties:
        displayName: {type: string, minLength: 1, maxLength: 255}
        apiName:
          type: string
          pattern: "^[a-z0-9]+([\\_a-z0-9]+)*$"
          minLength: 3
          maxLength: 255
          nullable: false
          description:  "field name should be in lower cases and should start with only latter, checkout pattern"
        flagMulti: {type: boolean}
        dataType: {'$ref': '#/components/schemas/FieldDataType'}
        access: {'$ref': '#/components/schemas/FieldAccessType'}
    FieldReadyState:
      type: string
      enum: [field_draft, field_not_ready, field_ready]
    MappedFieldRes:
      type: object
      required: [id, apiName, displayName, dataType, flagMulti, status, flagSystemField, access, flagTypesUpdatable]
      properties:
        id: {type: string, format: uuid}
        apiName: {type: string}
        displayName: {type: string}
        fieldName: {type: string}
        dataType: {'$ref': '#/components/schemas/FieldDataType'}
        status: {'$ref': '#/components/schemas/FieldReadyState'}
        flagMulti: {type: boolean}
        flagSystemField: {type: boolean}
        access: {'$ref': '#/components/schemas/FieldAccessType'}
        flagTypesUpdatable: {type: boolean}

    EventTypeListRes:
      type: object
      required: [list]
      properties:
        list:
          type: array
          items: {'$ref': '#/components/schemas/EventTypeRes'}
    EventTypeRes:
      type: object
      required: [eventTypeName, eventTypeId, systemEvent, draft, uid]
      properties:
        eventTypeName: {type: string}
        eventTypeId: {type: integer}
        systemEvent: {type: boolean}
        draft: {type: boolean}
        uid: {type: string, format: uuid}
    EventTypeCreateReq:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          pattern: "^[a-z0-9]+([\\_a-z0-9]+)*$"
          minLength: 3
          maxLength: 100
          nullable: false
    EmployeeCreateReq:
      type: object
      required: [username, password, firstName, lastName]
      additionalProperties: false
      properties:
        username:
          type: string
          maxLength: 255
        password:
          type: string
          maxLength: 255
        firstName:
          type: string
          maxLength: 255
        lastName:
          type: string
          maxLength: 255


    EmployeeCreateResp:
      type: object
      required: [userID]
      properties:
        userID:
          type: string
          format: uuid

    SignInReq:
      type: object
      required: [username, password, domainName]
      additionalProperties: false
      properties:
        username:
          type: string
        password:
          type: string
        domainName:
          type: string
    SignInResp:
      type: object
      required: [jwtToken]
      properties:
        jwtToken:
          type: string

    FieldValuesRes:
      type: object
      required: [fields, schema]
      properties:
        fields:
          type: object
          additionalProperties: true
        schema:
          type: object
          additionalProperties: true

    FieldNamesReq:
      type: object
      required: [ fieldNames ]
      properties:
        fieldNames:
          type: array
          items:
            type: string


    FieldValuesPageCustomersRes:
      type: object
      required: [ schema, list, totalCount ]
      properties:
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
        list:
          type: array
          items:
            type: object
            additionalProperties: true
        totalCount: { type: integer }

    FieldValuesPageEventsRes:
      type: object
      required: [ schema, event_type, list, totalCount]
      properties:
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
        event_type:
          type: object
          additionalProperties: true

        list:
          type: array
          items:
            type: object
            additionalProperties: true
        totalCount: {type: integer}

    FieldReportPageRes:
      type: object
      required: [list, totalCount]
      properties:
        list:
          type: array
          items:
            type: object
            required: [value, count]
            properties:
              value: {type: string, example: Macbook}
              count: {type: integer, example: 4}
        totalCount: {type: integer, example: 10}

    TenantCreateReq:
      type: object
      required: [name, domainName, user]
      additionalProperties: false
      properties:
        name: {type: string, example: Acme, maxLength: 100, minLength: 1, nullable: false}
        domainName: {type: string, example: example.cdp.com, maxLength: 100, minLength: 3, nullable: false }
        user: { '$ref': '#/components/schemas/TenantUserCreate' }
    TenantUserCreate:
      type: object
      required: [ email, password, firstName, lastName ]
      additionalProperties: false
      properties:
        email: { type: string, example: shop@cdp.ru, maxLength: 100, minLength: 5, nullable: false }
        password: { type: string }
        firstName: { type: string, example: Sergey, maxLength: 100, minLength: 2 }
        lastName: { type: string, example: Brin, maxLength: 100, minLength: 2 }
    TenantInfo:
      type: object
      required: [tenant, customerFields, eventFields]
      additionalProperties: false
      properties:
        tenant: {$ref: '#/components/schemas/TenantState'}
        customerFields:
          type: array
          items: {$ref: '#/components/schemas/Field'}
        eventFields:
          type: array
          items: {$ref: '#/components/schemas/Field'}
    TenantCreateRes:
      allOf:
        - "$ref": '#/components/schemas/TenantInfo'
    FieldFlags:
      type: object
      required: [sortKey, tableBuildIn, internalUse]
      additionalProperties: false
      properties:
        sortKey: {type: boolean, nullable: false}
        tableBuildIn: {type: boolean, nullable: false}
        internalUse: {type: boolean, nullable: false}
    Field:
      type: object
      required: [id, name, flags, createAt, updatedAt, type, size, nullable, state]
      additionalProperties: false
      properties:
        id: {type: string,  nullable: false, example: 'faccc5e8-5380-44f6-bda8-bfc4cbcb7ad6'}
        name: {type: string, maxLength: 100, nullable: false}
        flags: {$ref: '#/components/schemas/FieldFlags'}
        createAt: {type: string, format: date-time, nullable: false}
        updatedAt:  {type: string, format: date-time, nullable: false}
        type: {type: string, nullable: false}
        size: {type: integer, format: int32, nullable: true}
        nullable: {type: boolean, nullable: false}
        state: {type: string, enum: [absent, planned, present]}
    TenantState:
      type: object
      additionalProperties: false
      properties:
        tenantId: {type: integer, format: int64}
        name: {type: string, nullable: false}
        database: {$ref: '#/components/schemas/Artifact'}
        tableCustomer: {$ref: '#/components/schemas/Artifact'}
        tableEvents: {$ref: '#/components/schemas/Artifact'}
        topicCustomer: {$ref: '#/components/schemas/Artifact'}
        topicEvents: {$ref: '#/components/schemas/Artifact'}
        loadJobCustomers: {$ref: '#/components/schemas/Artifact'}
        loadJobEvents: {$ref: '#/components/schemas/Artifact'}
        isReady:
          type: boolean
      required: [tenantId, name, database, tableCustomer, tableEvents, topicCustomer, topicEvents, loadJobCustomers, loadJobEvents, isReady]

    PredicateFieldValue:
      type: object
      properties:
        string: {type: array, items: {type: string, maxLength: 1000}}
        time: {type: array, items: {type: string, format: date-time }}
        float64: {type: array, items: {type: number, format: float64}, x-go-type: '[]float64'}
        int64: {type: array, items: {type: integer, format: int64 }}
        bool: {type: array, items: {type: boolean }}

    ConditionParamMeta:
      type: object
      required: [kind]
      properties:
        kind: {type: string, enum: [field,udaf,expr]}
        fieldName: {type: string, minLength: 1, maxLength: 255}
        artifactId: {type: string, format: uuid}
        extraResult:
          type: object
          additionalProperties: true
    UDAFCondition:
      type: object
      required: [param,operator,value]
      properties:
        param: {'$ref': '#/components/schemas/ConditionParamMeta'}
        operator: {type: string, enum: ["=","!=",">","<",">=","<=","in","is null","is not null"]}
        value: {$ref: '#/components/schemas/PredicateFieldValue'}

    UDAFGroup:
      type: object
      required: [logicalOp, predicates]
      properties:
        logicalOp: { type: string, enum: [AND, OR], example: AND}
        predicates: {type: array, items: {$ref: '#/components/schemas/UDAFPredicate'}}
        negate: {type: boolean, default: false, example: false, nullable: false}

    UDAFPredicate:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:  {type: string, enum: [condition, group]}
        group: {$ref: '#/components/schemas/UDAFGroup'}
        condition: {$ref: '#/components/schemas/UDAFCondition'}

    EventTypeItem:
      type: object
      required: [id]
      properties:
        name: {type: string}
        flagSystemEvent: {type: boolean}
        id: {type: integer, x-go-type: int16}

    UDAFEventFilter:
      type: object
      required: [eventType, predicate, timeWindow]
      properties:
        eventType: { $ref: "#/components/schemas/EventTypeItem"}
        predicate: { $ref: "#/components/schemas/UDAFPredicate"}
        timeWindow: { $ref: "#/components/schemas/PredicateTimeWindow"}

    UDAFGroupingOpt:
      type: object
      required: [enable]
      properties:
        enable: {type: boolean}
        field: { $ref: "#/components/schemas/ParamNameItem" }
        take: {type: string, enum: [LAST, FIRST]}

    PredicateTimeValue:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [ABSOLUTE, RELATIVE]
        relativeDuration:  {type: integer}
        relativeUnit: {type: string, enum: [DAY, WEEK, MONTH, YEAR]}
        absoluteTime: {type: string, format: date-time}

    PredicateTimeWindow:
      type: object
      properties:
        from: { $ref: "#/components/schemas/PredicateTimeValue"}
        to: { $ref: "#/components/schemas/PredicateTimeValue"}

    ParamNameItem:
      type: object
      required: [fieldName]
      properties:
        mfieldId: {type: string, format: uuid, description: mapped field id}
        fieldName: {type: string}
        displayName: {type: string}

    UDAFReq:
      type: object
      required: [name, aggType, params, filter, grouping]
      properties:
        name:
          type: string
          description: "Name of the UDAF (e.g., ltv)"
        aggType:
          type: string
          enum: [SUM, COUNT, AVG, MIN, MAX]
          description: "Aggregate function type, (e.g., SUM, COUNT)"
        params:
          type: array
          items: { $ref: "#/components/schemas/ParamNameItem" }
          description: "List of field names for aggregate"
        grouping:
          $ref: "#/components/schemas/UDAFGroupingOpt"
        filter:
          $ref: "#/components/schemas/UDAFEventFilter"

    UDAFRes:
      type: object
      allOf:
        - $ref: "#/components/schemas/UDAFReq"
        - type: object
          required: [id, createdAt, updatedAt, tenantId]
          properties:
            id:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            tenantId:
              type: integer
              format: int64
    CampaignRes:
      type: object
      required: [id, name, commChan, includeSegment, excludeSegment]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 100}
        commChan: {"$ref": "#/components/schemas/CommChanNameItem"}
        template: {"$ref": "#/components/schemas/TemplateDetailsRes"}
        includeSegment:
          type: array
          items: {$ref: "#/components/schemas/SegmentRefRes"}
        excludeSegment:
          type: array
          items: {$ref: "#/components/schemas/SegmentRefRes"}
    SegmentRefRes:
      type: object
      required: [segmentationID,segmentationName,segmentID,segmentName]
      properties:
        segmentationID: {type: string, format: uuid}
        segmentationName: {type: string}
        segmentID: {type: string, format: uuid}
        segmentName: {type: string}

    CampaignPeviewRes:
      type: object
      required: [numberOfCustomer]
      properties:
        numberOfCustomer: {type: integer, format: int64}
    CampaignReq:
      type: object
      required: [name, commChanId, includeSegment, excludeSegment]
      properties:
        name: {type: string, maxLength: 100}
        commChanId: {type: string, format: uuid}
        includeSegment:
          type: array
          items: {type: string, format: uuid}
        excludeSegment:
          type: array
          items: {type: string, format: uuid}
        templateId:
          type: string
          format: uuid

    CommChanNameItem:
      type: object
      required: [id, name, kind, verified]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 100}
        kind: {type: string, maxLength: 100}
        verified: {type: boolean, nullable: false}

    KeyedMessage:
      type: object
      required: [key, message]
      properties:
        key: {type: string, nullable: false}
        message: {type: string, nullable: false}
    CommChanValidationResult:
      type: object
      required: [valid, message, configError, missingFields]
      properties:
        valid: {type: boolean, nullable: false}
        message: {type: string, nullable: false}
        configError:
          type: array
          items: {'$ref': '#/components/schemas/KeyedMessage'}
        missingFields:
          type: array
          items: {type: string}
    CommChanVerificaitonRes:
      type: object
      required: [verified, message]
      properties:
        verified: {type: boolean, nullable: false}
        message: {type: string, nullable: false}
    CommChanRes:
      type: object
      required: [id, name, kind, mappings, chanconf, createdAt, updatedAt, verified]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 100}
        kind: {type: string, maxLength: 100}
        verified: {type: boolean, nullable: false}
        mappings: {type: object, additionalProperties: {type: string}}
        chanconf: {type: object, additionalProperties: {type: string}}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    CommChanReq:
      type: object
      required: [name, kind, mappings, chanconf]
      properties:
        name: {type: string, maxLength: 100}
        kind: {type: string, maxLength: 100}
        mappings: {type: object, additionalProperties: {type: string}}
        chanconf: {type: object, additionalProperties: {type: string}}
    SpecificFieldsReq:
      type: object
      required: [field_type, field_name]
      properties:
        field_type: {type: string, enum: [email, phone]}
        field_name: {type: string}

    GetSpecificFieldsResp:
      type: object
      additionalProperties: true

    SpecificFieldsResp:
      type: object
      required: [id, field_type, field_name, field_api_name, field_display_name]
      properties:
        id: {type: string, format: uuid}
        field_type: {type: string}
        field_name: {type: string}
        field_api_name: {type: string}
        field_display_name: {type: string}

    TemplateReq:
      type: object
      required: [content_type, name, subject, content, variables]
      properties:
        content_type: {type: string, enum: [html, text, json]}
        name: {type: string, maxLength: 100}
        subject: {type: string, maxLength: 100}
        content: {type: string}
        variables: {type: object, additionalProperties: {type: string}}

    TemplateRes:
      type: object
      required: [id]
      properties:
        id: {type: string, format: uuid}

    PageTemplateRes:
      type: object
      required: [ list, totalCount ]
      properties:
        list:
          type: array
          items: {'$ref':  '#/components/schemas/PageTemplateObjRes'}
        totalCount: {type: integer, format: int64, nullable: false}

    PageTemplateObjRes:
      type: object
      required: [id, template_name, subject, content_type]
      properties:
        id: { type: string, format: uuid }
        template_name: { type: string }
        content_type: { type: string }
        subject: { type: string }

    TemplateDetailsRes:
      type: object
      required: [ id, template_name, content_type, subject, content, variables ]
      properties:
        id: { type: string, format: uuid }
        template_name: {type: string}
        content_type: {type: string}
        subject: {type: string}
        content: {type: string}
        variables: {type: object, additionalProperties: true}

    SegmentCreateReq:
      type: object
      required: ['name', 'customerProfileFilter']
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
        customerProfileFilter: { $ref: '#/components/schemas/UDAFPredicate' }
    SegmentationCreateReq:
      type: object
      required: ['name', 'segments']
      properties:
        name:
          type: string
        segments:
          type: array
          items: { $ref: '#/components/schemas/SegmentCreateReq' }
    SegmentationUpdateReq:
      type: object
      required: ['name', 'segments']
      properties:
        name:
          type: string
        segments:
          type: array
          items: { $ref: '#/components/schemas/SegmentUpdateReq' }
    SegmentUpdateReq:
      type: object
      required: [id, name, customerProfileFilter]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
          minLength: 1
        customerProfileFilter: { $ref: '#/components/schemas/UDAFPredicate' }
    SegmentRes:
      type: object
      required: [id, name, customerProfileFilter]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
          minLength: 1
        customerProfileFilter: { $ref: '#/components/schemas/UDAFPredicate' }
    SegmentationRes:
      type: object
      required: [id, name, createdAt, updatedAt, segments]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        segments:
          type: array
          items: { $ref: '#/components/schemas/SegmentRes' }

    SegmentPreviewRes:
      type: object
      required: [name, numberOfCustomer]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        numberOfCustomer: {type: integer, format: int64}
    SegmentationPreviewRes:
      type: object
      required: [segments]
      properties:
        segments:
          type: array
          items: { '$ref': '#/components/schemas/SegmentPreviewRes'}

    UISettingsCreateReq:
      type: object
      required: [ key, data ]
      properties:
        key: { type: string }
        data: { type: object, additionalProperties: true }

    UISettingsCreateResp:
      type: object
      required: [ userId, key, data ]
      properties:
        userId: {type: string, format: uuid}
        key: { type: string }
        data: { type: object, additionalProperties: true }

    ListUISettingsRespObj:
      type: object
      required: [ key, data ]
      properties:
        key: {type: string}
        data: { type: object, additionalProperties: true }

    UISettingsDetailsResp:
      type: object
      required: [ key, data ]
      properties:
        key: { type: string }
        data: { type: object, additionalProperties: true }

    GetDataTotalCountResp:
      type: object
      required: [eventCount, customerCount]
      properties:
        eventCount: {type: integer, format: int}
        customerCount: {type: integer, format: int}

    GetEventTypesCountResp:
      type: array
      items:
        type: object
        additionalProperties: true
