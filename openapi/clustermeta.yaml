    get:
      tags:
        - categorizations
      summary: Get Categorization
      operationId: get_categorization
      description: "Get a single categorization by ID"
      parameters:
        - in: path
          name: categorizationId
          schema:
            type: string
            format: uuid
          required: true
          description: "Categorization ID"
      responses:
        "200":
          description: "Categorization detail"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorizationInfo"
        "404": { description: "Categorization not found" }
    put:
      tags:
        - categorizations
      summary: Update Categorization
      operationId: update_categorization
      description: >
        Update a Categorization. When the update would affect segments that use this
        Categorization in their predicate, a dry-run preview is returned (HTTP 200 with
        affected_segments populated and no update applied). Pass ?force=true to bypass
        the warning and apply the update immediately.
      parameters:
        - in: path
          name: categorizationId
          schema:
            type: string
            format: uuid
          required: true
          description: "Categorization ID"
        - in: query
          name: force
          schema:
            type: boolean
            default: false
          description: "Apply update even when dependent segments are affected"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategorizationUpdateReq"
      responses:
        "200":
          description: "Update result — either the updated categorization or a preview"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategorizationUpdateRes"
        "400": { "$ref": "#/components/responses/StandardError" }
        "404": { description: "Categorization not found" }
        "502": { "$ref": "#/components/responses/StandardError" }
    delete:
      tags:
        - categorizations
      summary: Delete Categorization
      operationId: delete_categorization
      description: >
        Soft-delete a Categorization. Returns 409 Conflict when segments still
        reference this Categorization.
      parameters:
        - in: path
          name: categorizationId
          schema:
            type: string
            format: uuid
          required: true
          description: "Categorization ID"
      responses:
        "204": { description: "Categorization deleted" }
        "404": { description: "Categorization not found" }
        "409": { "$ref": "#/components/responses/StandardError" }

