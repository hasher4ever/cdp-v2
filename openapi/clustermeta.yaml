    post:
      tags:
        - categorizations
      summary: Refresh Categorization Breakpoints
      operationId: refresh_categorization
      description: "Trigger an immediate recomputation of breakpoints for this Categorization"
      parameters:
        - in: path
          name: categorizationId
          schema:
            type: string
            format: uuid
          required: true
