        "400": { "$ref": "#/components/responses/StandardError" }
        "422": { "$ref": "#/components/responses/StandardError" }
        "502": { "$ref": "#/components/responses/StandardError" }

  /api/tenants/heatmap/create-segment:
    post:
      tags:
        - categorizations
      summary: Heatmap Create Draft Segment
      operationId: heatmap_create_draft_segment
      description: |
        Generate a draft segment predicate from a heatmap cell selection.
